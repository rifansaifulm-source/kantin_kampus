<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kantin Kampus - Daftar Warung</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Kantin Kampus</h1>
  </header>

  <main class="container">
    <section class="welcome">
      <p>Selamat datang, <strong id="welcomeName"></strong>!</p>
      <p><a href="index.html">Kembali ke Home</a></p>
    </section>

    <section class="filters" aria-label="Filter warung" style="display:flex; align-items:center;">
      <label for="filter">Filter kategori:</label>
      <select id="filter">
        <option>Semua</option>
        <option>Makanan Berat</option>
        <option>Makanan Ringan</option>
        <option>Minuman</option>
      </select>
      <!-- Keranjang button (open drawer) -->
      <button id="openCartBtn" class="btn" style="margin-left:auto;">Keranjang</button>
    </section>

    <section id="stalls" class="stalls-grid" aria-label="Daftar warung">
      <!-- Warung/warkop cards akan dirender di sini -->
    </section>
  </main>

  <!-- Drawer Keranjang -->
  <aside id="cartPanel" class="cart-panel" aria-label="Keranjang belanja">
    <div class="cart-header">
      <strong>Keranjang</strong>
      <button id="closeCartBtn" class="btn" style="float:right;">Tutup</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-total" aria-live="polite">
      <p>Total: <span id="cartTotal">Rp 0</span></p>
      <button id="checkoutBtn" class="btn">Checkout</button>
    </div>
  </aside>

  <footer class="site-footer">
    <p>© 2025 Kantin Kampus</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
